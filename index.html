<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>跳动的心</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        canvas {
            display: block;
        }

        .author {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: #FF69B4;
        }

        .text {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: #FF69B4;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <canvas id="heartCanvas" width="640" height="480"></canvas>
    <div class="text">点燃我 温暖你</div>
    <div class="author">Author</div>

    <script>
        // 把上面的 heart.js 内容复制到这里
        // 画布设置
        const CANVAS_WIDTH = 640;
        const CANVAS_HEIGHT = 480;
        const CANVAS_CENTER_X = CANVAS_WIDTH / 2;
        const CANVAS_CENTER_Y = CANVAS_HEIGHT / 2;
        const IMAGE_ENLARGE = 11;
        const HEART_COLOR = "#FF69B4";

        // 爱心类
        class Heart {
            constructor(generate_frame = 20) {
                this._points = new Set();
                this._edge_diffusion_points = new Set();
                this._center_diffusion_points = new Set();
                this.all_points = {};
                this.generate_frame = generate_frame;

                this.build(2000);

                for (let frame = 0; frame < generate_frame; frame++) {
                    this.calc(frame);
                }
            }

            // 爱心函数
            heartFunction(t, shrink_ratio = IMAGE_ENLARGE) {
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

                x *= shrink_ratio;
                y *= shrink_ratio;

                x += CANVAS_CENTER_X;
                y += CANVAS_CENTER_Y;

                return [Math.floor(x), Math.floor(y)];
            }

            // 内部扩散
            scatterInside(x, y, beta = 0.15) {
                const ratio_x = -beta * Math.log(Math.random());
                const ratio_y = -beta * Math.log(Math.random());

                const dx = ratio_x * (x - CANVAS_CENTER_X);
                const dy = ratio_y * (y - CANVAS_CENTER_Y);

                return [x - dx, y - dy];
            }

            // 抖动
            shrink(x, y, ratio) {
                const distance = Math.pow(Math.pow(x - CANVAS_CENTER_X, 2) + Math.pow(y - CANVAS_CENTER_Y, 2), 0.6);
                const force = -1 / distance;

                const dx = ratio * force * (x - CANVAS_CENTER_X);
                const dy = ratio * force * (y - CANVAS_CENTER_Y);

                return [x - dx, y - dy];
            }

            // 曲线函数
            curve(p) {
                return 2 * (2 * Math.sin(4 * p)) / (2 * Math.PI);
            }

            // 构建初始点集
            build(number) {
                // 爱心轮廓
                for (let i = 0; i < number; i++) {
                    const t = Math.random() * 2 * Math.PI;
                    const [x, y] = this.heartFunction(t);
                    this._points.add(`${x},${y}`);
                }

                // 边缘扩散
                const pointList = Array.from(this._points).map(p => p.split(',').map(Number));
                for (let [x, y] of pointList) {
                    for (let j = 0; j < 3; j++) {
                        const [sx, sy] = this.scatterInside(x, y, 0.05);
                        this._edge_diffusion_points.add(`${sx},${sy}`);
                    }
                }

                // 中心扩散
                for (let i = 0; i < 6000; i++) {
                    const [x, y] = pointList[Math.floor(Math.random() * pointList.length)];
                    const [sx, sy] = this.scatterInside(x, y, 0.17);
                    this._center_diffusion_points.add(`${sx},${sy}`);
                }
            }

            // 计算位置
            calcPosition(x, y, ratio) {
                const distance = Math.pow(Math.pow(x - CANVAS_CENTER_X, 2) + Math.pow(y - CANVAS_CENTER_Y, 2), 0.520);
                const force = 1 / distance;

                const dx = ratio * force * (x - CANVAS_CENTER_X) + (Math.random() * 2 - 1);
                const dy = ratio * force * (y - CANVAS_CENTER_Y) + (Math.random() * 2 - 1);

                return [x - dx, y - dy];
            }

            // 计算帧
            calc(generate_frame) {
                const ratio = 10 * this.curve(generate_frame / 10 * Math.PI);
                const halo_radius = Math.floor(4 + 6 * (1 + this.curve(generate_frame / 10 * Math.PI)));
                const halo_number = Math.floor(3000 + 4000 * Math.abs(Math.pow(this.curve(generate_frame / 10 * Math.PI), 2)));

                const all_points = [];
                const heart_halo_point = new Set();

                // 光环
                for (let i = 0; i < halo_number; i++) {
                    const t = Math.random() * 4 * Math.PI;
                    let [x, y] = this.heartFunction(t, 11.5);
                    [x, y] = this.shrink(x, y, halo_radius);

                    if (!heart_halo_point.has(`${x},${y}`)) {
                        heart_halo_point.add(`${x},${y}`);
                        x += Math.random() * 28 - 14;
                        y += Math.random() * 28 - 14;
                        const size = Math.random() < 0.5 ? 1 : 2;
                        all_points.push([x, y, size]);
                    }
                }

                // 轮廓点
                Array.from(this._points).map(p => p.split(',').map(Number)).forEach(([x, y]) => {
                    const [nx, ny] = this.calcPosition(x, y, ratio);
                    const size = Math.floor(Math.random() * 3) + 1;
                    all_points.push([nx, ny, size]);
                });

                // 边缘扩散点
                Array.from(this._edge_diffusion_points).map(p => p.split(',').map(Number)).forEach(([x, y]) => {
                    const [nx, ny] = this.calcPosition(x, y, ratio);
                    const size = Math.floor(Math.random() * 2) + 1;
                    all_points.push([nx, ny, size]);
                });

                // 中心扩散点
                Array.from(this._center_diffusion_points).map(p => p.split(',').map(Number)).forEach(([x, y]) => {
                    const [nx, ny] = this.calcPosition(x, y, ratio);
                    const size = Math.floor(Math.random() * 2) + 1;
                    all_points.push([nx, ny, size]);
                });

                this.all_points[generate_frame] = all_points;
            }

            // 渲染
            render(ctx, render_frame) {
                const frame = render_frame % this.generate_frame;
                if (!this.all_points[frame]) return;

                ctx.fillStyle = HEART_COLOR;
                this.all_points[frame].forEach(([x, y, size]) => {
                    ctx.fillRect(x, y, size, size);
                });
            }
        }

        // 动画循环
        let frame = 0;
        let heart;

        function init() {
            const canvas = document.getElementById('heartCanvas');
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;
            const ctx = canvas.getContext('2d');

            heart = new Heart(20);

            function animate() {
                ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                // 绘制文字
                ctx.font = 'bold 24px "Microsoft YaHei"';
                ctx.fillStyle = '#FF69B4';
                ctx.textAlign = 'center';
                ctx.fillText('点燃我 温暖你', CANVAS_CENTER_X, 100);

                // 渲染爱心
                if (heart) {
                    heart.render(ctx, frame);
                }

                frame++;
                requestAnimationFrame(animate);
            }

            animate();
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>

</html>
