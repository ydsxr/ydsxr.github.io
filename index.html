<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Rose</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:Arial;
background:black;
}

/* 初始背景图片 */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("星空草地.png") no-repeat center center;
background-size:cover;
z-index:0;
}

/* 星空 */
#starCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
display:none;
}

/* 视频容器 */
.video-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
z-index:2;
opacity:0;
pointer-events:none;
background:black;
}

video{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
max-width:150%;
max-height:150%;
object-fit:contain;
}

/* 对话框背景 */
.dialog-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
z-index:5;
}

/* 对话框 */
.dialog{
background:transparent;
padding:40px;
text-align:center;
max-width:300px;
}

.dialog h2{
margin-bottom:25px;
font-size:24px;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button:hover{
background:#45a049;
}

/* 五角星粒子层 */
#starParticleCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:4;
}

</style>
</head>

<body>

<!-- 背景图片 -->
<div class="bg" id="bg"></div>

<!-- 星空 -->
<canvas id="starCanvas"></canvas>

<!-- 五角星粒子层 -->
<canvas id="starParticleCanvas"></canvas>

<!-- 对话框 -->
<div class="dialog-bg" id="dialog">
<div class="dialog">
<h2>A rose for you 🌹</h2>
<button onclick="acceptRose()">Accept</button>
</div>
</div>

<!-- 视频 -->
<div class="video-container" id="videoBox">
    <video
    id="roseVideo"
    src="蓝色玫瑰代码.mp4"
    muted
    playsinline
    webkit-playsinline
    x5-playsinline
    x5-video-player-type="h5"
    x5-video-player-fullscreen="false"
    x5-video-orientation="portrait"
    loop
    preload="auto"
    ></video>
</div>

<!-- 音乐 -->
<audio id="bgm" src="城南花已开.mp3" loop></audio>

<script>

function acceptRose(){

document.getElementById("dialog").style.display="none";
document.getElementById("bg").style.display="none";

document.getElementById("starCanvas").style.display="block";

let videoBox=document.getElementById("videoBox");
videoBox.style.opacity="1";

let video=document.getElementById("roseVideo");
let bgm=document.getElementById("bgm");

video.play().catch(()=>{});
bgm.play().catch(()=>{});

startStars();

}

/* 星空 */

function startStars(){

const canvas=document.getElementById("starCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<200;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
alpha:Math.random(),
speed:Math.random()*0.02
});

}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(star=>{

star.alpha+=star.speed;

if(star.alpha>1||star.alpha<0){
star.speed*=-1;
}

ctx.beginPath();
ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,"+star.alpha+")";
ctx.fill();

});

requestAnimationFrame(drawStars);

}

drawStars();

}

/* ================= 新增：原地蓝色五角星 ================= */

const spCanvas = document.getElementById("starParticleCanvas");
const spCtx = spCanvas.getContext("2d");
spCanvas.width = window.innerWidth;
spCanvas.height = window.innerHeight;

let starParticles = [];

// 绘制空心五角星
function drawPentagram(ctx, x, y, radius, rotation){
ctx.save();
ctx.translate(x,y);
ctx.rotate(rotation);
ctx.beginPath();
for(let i=0;i<5;i++){
ctx.lineTo(Math.cos((18+i*72)/180*Math.PI)*radius,
           -Math.sin((18+i*72)/180*Math.PI)*radius);
ctx.lineTo(Math.cos((54+i*72)/180*Math.PI)*(radius*0.5),
           -Math.sin((54+i*72)/180*Math.PI)*(radius*0.5));
}
ctx.closePath();
ctx.strokeStyle = "#0D47A1"; // 深蓝色
ctx.lineWidth = 3;
ctx.stroke();
ctx.restore();
}

// 点击生成五角星
document.addEventListener("click",function(e){
starParticles.push({
x:e.clientX,
y:e.clientY,
radius:10,
alpha:1,
rotation:Math.random()*2*Math.PI
});
});

function animateStars(){
spCtx.clearRect(0,0,spCanvas.width,spCanvas.height);

starParticles.forEach((p,i)=>{
p.radius += 0.5;
p.alpha -= 0.02;
p.rotation += 0.05;

spCtx.globalAlpha = p.alpha;
drawPentagram(spCtx, p.x, p.y, p.radius, p.rotation);

if(p.alpha <=0){
starParticles.splice(i,1);
}
});

spCtx.globalAlpha =1;
requestAnimationFrame(animateStars);
}

animateStars();

</script>

</body>
</html>
