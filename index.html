<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蓝色玫瑰视频</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        /* 视频容器 - 全屏显示 */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }
        
        /* 视频样式 - 确保视频填充整个屏幕不变形 */
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover; /* 保持宽高比并覆盖整个容器 */
        }
        
        /* 针对不同屏幕比例的优化 */
        @media (max-aspect-ratio: 16/9) {
            video {
                width: 100%;
                height: auto;
            }
        }
        
        @media (min-aspect-ratio: 16/9) {
            video {
                width: auto;
                height: 100%;
            }
        }
        
        /* 针对手机竖屏的特别优化 */
        @media (max-width: 768px) and (orientation: portrait) {
            video {
                width: auto;
                height: 100%;
                min-width: auto;
                min-height: 100%;
                object-fit: cover;
            }
        }
        
        /* 针对手机横屏的优化 */
        @media (max-width: 896px) and (orientation: landscape) {
            video {
                width: 100%;
                height: auto;
                min-width: 100%;
                min-height: auto;
                object-fit: cover;
            }
        }
        
        /* 针对超宽屏幕的优化 */
        @media (min-aspect-ratio: 21/9) {
            video {
                width: 100%;
                height: auto;
                min-width: 100%;
                min-height: auto;
            }
        }
        
        /* 针对特别窄的屏幕 */
        @media (max-aspect-ratio: 9/16) {
            video {
                width: auto;
                height: 100%;
                min-width: auto;
                min-height: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 视频容器 - 全屏显示 -->
    <div class="video-container">
        <video src="蓝色玫瑰代码.mp4" autoplay loop muted playsinline webkit-playsinline x5-playsinline></video>
    </div>
    <audio controls>
      <source src="你的音频文件.mp3" type="audio/mpeg">
      <!-- 您的浏览器不支持 audio 元素，建议您升级或更换浏览器。 -->
    </audio>
</body>
</html>
